# ── Patchscope Test ───────────────────────────────────────────────────
# Reproduces the canonical example from Patchscopes (Ghandeharioun et al.,
# ICML 2024, arXiv:2401.06102), Figure 1:
#
#   Source:  "Amazon's former CEO attended Oscars"
#   Target:  "cat -> cat; 135 -> 135; hello -> hello; ?"
#   Patch:   hidden state of "CEO" → hidden state of "?" in target
#   Expect:  model generates "Jeff Bezos" or related token
#
# This verifies the core extract→inject→decode pipeline works correctly
# before running persona experiments.

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  dtype: float16
  device_map: "auto"

# ── Source prompt ─────────────────────────────────────────────────────
source:
  # Raw text, NOT chat-templated — this is a base-model-style prompt
  text: "Amazon's former CEO attended Oscars"
  # Which token to extract from (the word "CEO")
  extract_word: "CEO"
  # If the word spans multiple tokens, use "last" subtoken
  subtoken_strategy: "last"

# ── Target prompt ─────────────────────────────────────────────────────
# Two styles to test:
#   "raw"  — base-model-style few-shot token identity (from paper §4.1)
#   "chat" — instruct-model-style with chat template
#
# The paper used raw prompts on base models. Instruct models need chat
# prompts to produce meaningful output from patched activations.

target:
  style: "chat"   # "raw" or "chat"

  # Raw target (paper-style, for base models)
  raw_text: "cat -> cat; 135 -> 135; hello -> hello; ?"
  raw_inject_token: "?"

  # Chat target (for instruct models)
  # System prompt is intentionally minimal — we want the model to decode
  # the activation, not follow elaborate instructions.
  chat_system: "You are a helpful assistant."
  chat_user: "Tell me about ___"
  chat_inject_token: "___"

# ── Layer configuration ──────────────────────────────────────────────
# Two modes:
#   1. match_source_target: true  — sweep uses the SAME layer for both
#      extract and inject (ℓ* = ℓ), per the paper's default.
#   2. match_source_target: false — uses explicit layer_pairs below.

layers:
  # Sweep these layers when match_source_target is true
  sweep: [1, 3, 5, 8, 10, 15, 20, 25, 30]
  match_source_target: true

  # Explicit (source_layer, injection_layer) pairs.
  # Always appended after the sweep pairs.
  # Tests deep-extract → shallow-inject (where Patchscopes works best):
  layer_pairs:
    - [15, 1]     # mid source → very early target
    - [15, 3]     # mid source → early target
    - [15, 5]     # mid source → shallow target
    - [20, 1]
    - [20, 3]
    - [20, 5]
    - [25, 1]
    - [25, 3]
    - [25, 5]
    - [30, 1]
    - [30, 3]
    - [30, 5]

# ── Generation ───────────────────────────────────────────────────────
generation:
  max_new_tokens: 10
  temperature: 0.0
  do_sample: false

# ── Additional test cases (always run after the main example) ────────
extra_tests:
  - source_text: "The Eiffel Tower is located in"
    extract_word: "Tower"
    expected_contains: "Paris"

  - source_text: "Microsoft was founded by Bill"
    extract_word: "Bill"
    expected_contains: "Gates"
