# All prompt templates used by experiments.
# Edit these to change how the model is instructed — no code changes needed.

# Format string shown to the model when asking for constrained output.
# Available placeholders: {choice_str}
response_format: |
  Answer: <one of {choice_str}>
  Confidence: <1-5>
  Refuse: <yes/no>

# Cross-persona prediction: reporter persona predicts target persona's behavior.
# Available placeholders: {target_persona_name}, {target_persona_description}, {task_prompt}, {response_format}
cross_persona_prediction: |
  You are being asked to predict how a different AI persona would respond.

  The target persona is: {target_persona_name}
  {target_persona_description}

  Task:
  {task_prompt}

  Predict the target persona's response in exactly this format:
  {response_format}

# Source-reporter matrix: source persona continues from pause point.
# Available placeholders: {response_format}
source_continuation: |
  Now provide your answer in exactly this format:
  {response_format}

# Source-reporter matrix: reporter persona reports on the model's current state.
# Available placeholders: {reporter_system_prompt}, {response_format}
reporter_suffix: |
  [System: {reporter_system_prompt}]
  Now, report on what the model is currently most inclined to answer.
  Respond in exactly this format:
  {response_format}

# No-cache baseline: reporter predicts source behavior from scratch (no shared state).
# Available placeholders: {source_name}, {task_prompt}, {response_format}
no_cache_baseline: |
  A different AI persona called '{source_name}' was given this task:

  {task_prompt}

  Predict what that persona would answer. Respond in exactly this format:
  {response_format}

# KV cache: minimal prompt appended after prefix to elicit answer token for metrics.
source_state_probe: "Answer:"

# ── Confidence vs Entropy experiment ──────────────────────────────────
# Three separate prompts per trial, each in an independent context.

# Prompt 1: Open-ended reasoning. Let the model explain its thinking freely.
# Available placeholders: {question_prompt}
ce_open_ended: |
  Answer the following multiple-choice question. Explain your reasoning briefly.

  {question_prompt}

# Prompt 2: Forced-choice. Model must output ONLY the answer letter.
# Available placeholders: {question_prompt}, {options_str}
# The setup instruction forces single-letter output for clean logprob extraction.
ce_forced_choice_setup: >
  I'm going to ask you a series of multiple-choice questions. For each one,
  select the answer you think is best. Respond only with the letter of your
  choice; do NOT output any other text.

# Available placeholders: {question_text}, {formatted_options}, {options_str}
ce_forced_choice: |
  ------------------------------
  Question:
  {question_text}
  ----------
  {formatted_options}
  ------------------------------
  Your choice ({options_str}):

# Prompt 3: Stated confidence. Model rates its confidence using letter codes.
# Available placeholders: {question_prompt}, {confidence_options_str}
ce_stated_confidence_setup: >
  I'm going to show you a question, and I want you to tell me your level
  of confidence that you know the correct answer to this question. Respond
  only with the letter corresponding to the percentage range you choose;
  do NOT output any other text.

# Available placeholders: {question_text}, {formatted_options}, {confidence_formatted_options}, {confidence_options_str}
ce_stated_confidence: |
  ------------------------------
  Question:
  {question_text}
  ----------
  {formatted_options}
  ------------------------------

  How confident are you that you know the correct answer to this question?
  ----------
  {confidence_formatted_options}
  ------------------------------
  Your choice ({confidence_options_str}):
