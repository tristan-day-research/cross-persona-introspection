# ── Base model Confidence vs Entropy configs ──────────────────────────
# Uses few-shot pattern completion instead of chat template / system prompts.
# Only 2 prompts per trial (forced-choice MC + stated confidence).

confidence_entropy_base_dev:
  experiment_name: confidence_entropy_base
  model_name: "meta-llama/Llama-3.1-8B"
  personas:
    - default_assistant
    - chemist
    - historian
    - artist
    - cautious_hedging
    - bold_assertive
    - five_year_old
  task_sets: []
  sample_size: 5
  seed: 42
  max_new_tokens: 24
  temperature: 0.0
  few_shot_mode: balanced  # "fixed", "random", or "balanced"
  use_persona_suffixes: true  # insert "As a chemist:" before actual question
  confidence_legend: ordinal  # "bins" (S: <5% ...) or "ordinal" (S=lowest, Z=highest)

# ── Activation Probing configs ──────────────────────────────────────

activation_probing_dev:
  experiment_name: activation_probing
  model_name: "dphn/Dolphin-Mistral-24B-Venice-Edition"
  model_dtype: bfloat16   # A100 80GB required; use float16 or omit for Llama 8B on 4090
  # model_name: "meta-llama/Llama-3.1-8B-Instruct"
  # model_dtype: float16
  batch_size: 1
  personas:
    - persona_conservative
    - persona_progressive
  task_sets: []  # loaded directly from tasks/opposing_personas_politics.json
  task_file: "opposing_personas_politics.json"
  sample_size: 15
  seed: 42
  max_new_tokens: 1   # not used (no generation), but kept for RunConfig
  temperature: 0.0

activation_probing_full:
  experiment_name: activation_probing
  # model_name: "dphn/Dolphin-Mistral-24B-Venice-Edition"
  # model_name: "meta-llama/Llama-3.1-8B-Instruct"
  model_name: "meta-llama/Llama-3.3-70B-Instruct"
  model_dtype: bfloat16   # A100 80GB required
  # model_dtype: float16
  batch_size: 1
  personas:
    - persona_conservative
    - persona_progressive
  task_sets: []
  task_file: "opposing_personas_politics.json"
  sample_size: null
  seed: 42
  max_new_tokens: 1
  temperature: 0.0

