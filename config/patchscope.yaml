# Patchscope activation interpretation pipeline configuration
#
# References:
#   Patchscopes: Ghandeharioun et al., "Patchscopes: A Unifying Framework for
#     Inspecting Hidden Representations of Language Models", ICML 2024. arXiv:2401.06102
#   SelfIE: Chen et al., "SelfIE: Self-Interpretation of Large Language Model
#     Embeddings", ICML 2024. arXiv:2403.10949

# ── Activation extraction ────────────────────────────────────────────────
extraction:
  # Which token position to extract from.
  #   "last"  — final token of the source prompt (default, most common)
  #   integer — explicit 0-based index into the source sequence
  token_position: "last"

  # Which layer(s) to extract from (ℓ* in Patchscopes notation).
  #   "all"    — every transformer layer (expensive)
  #   "middle" — auto-select middle third of layers
  #   list     — explicit layer indices, e.g. [8, 16, 24]
  #   integer  — single layer index
  layers: "middle"



# ── Activation injection ─────────────────────────────────────────────────
injection:
  # Injection layer k in the interpretation forward pass.
  # SelfIE ablation (Figure 11) found k < 20 best for 80-layer models.
  # For 32-layer models, k=3 is a good default.
  layer: 8

  # "replace" — overwrite hidden state at placeholder positions (Patchscopes default)
  # "add"     — activation * alpha added to existing hidden state
  mode: "replace"

  # Scaling factor for "add" mode (ignored when mode="replace")
  alpha: 1.0

  # Placeholder style — controls both the token and count.
  #   "patchscopes" — 1 × "___" token (inspired by Ghandeharioun et al., arXiv:2401.06102)
  #   "selfie"      — 5 × "___" tokens (inspired by Chen et al., arXiv:2403.10949)
  #                   NOTE: Llama 3.1 has no <unk> token, so we use "___" (single
  #                   token, semantically neutral). The original SelfIE paper used
  #                   <unk> on LLaMA-2 which had a real unk token.
  #   "custom"      — use placeholder_token and num_placeholders below
  placeholder_style: "patchscopes"

  # Only used when placeholder_style: "custom"
  num_placeholders: 1
  placeholder_token: "?"

# ── Generation ───────────────────────────────────────────────────────────
generation:
  max_new_tokens: 128
  temperature: 0.0
  do_sample: false

  # Decoding mode for constrained templates (answer_extraction, persona_probe, etc.)
  #   "logits"   — single-token decode, extract logit distribution over valid choices.
  #                No text generation. Measures what the activation encodes directly.
  #   "generate" — multi-token generation, parse answer from text. For qualitative runs.
  # Unconstrained templates (open_summary) always use "generate".
  constrained_mode: "logits"

# ── Relevancy score (SelfIE Section 3.2) ─────────────────────────────────
# relevancy(t_i) = P(t_i | WITH injection) - P(t_i | WITHOUT injection)
# Requires two forward passes per generated token — expensive.
relevancy:
  enabled: false
  max_tokens: 64   # limit relevancy computation to first N generated tokens

# ── Interpretation prompt templates ──────────────────────────────────────

# Each template has two prompt styles:
#
#   patchscopes: Pattern-completion style. The {placeholder} token goes at the
#     END so the model is forced to "complete" what the patched activation
#     represents. No explicit instructions — the prompt structure does the work.
#
#   selfie: Instructional style. The {placeholder} tokens go in the MIDDLE as a
#     "data block" with instructions around them telling the model to interpret.
#
# Use {placeholder} to mark where the token(s) go.
# Use {question_text}, {options}, {statement} for question content.

interpretation_templates:

  # ── Core 3 (strongest causal claims) ──────────────────────────────────

  answer_extraction:
    patchscopes: |
      Question: {question_text}
      Options: {options}

      Answer: {placeholder}
    selfie: |
      Base your answer only on this representation.

      {placeholder}

      Question: {question_text}
      Options: {options}

      What answer did the model choose? Respond with a single letter.
    constrained: true

  persona_probe:
    patchscopes: |
      This representation was produced by someone with either a Conservative or Progressive political perspective.
      Political perspective: {placeholder}
    selfie: |
      Base your answer only on this representation.

      {placeholder}

      Was this produced by someone with a Conservative or Progressive perspective?
      Respond with: Conservative or Progressive.
    constrained: true

  agreement_probe:
    patchscopes: |
      Statement: {statement}

      Position: {placeholder}
    selfie: |
      Base your answer only on this representation.

      {placeholder}

      Does this correspond to agreeing or disagreeing with: {statement}

      Respond with: Agree or Disagree.
    constrained: true

  # ── Secondary (weaker causal claims) ──────────────────────────────────

  open_summary:
    patchscopes: |
      This representation encodes the following about the model's reasoning:
      {placeholder}
    selfie: |
      Base your answer only on this representation.

      {placeholder}

      Describe what this representation encodes.
    constrained: false

  self_recognition:
    patchscopes: |
      This representation was produced by either the current assistant (Self) or a different one (Other).
      Source: {placeholder}
    selfie: |
      Base your answer only on this representation.

      {placeholder}

      Was this produced by you (Self) or someone else (Other)?
      Respond with: Self or Other.
    constrained: true

