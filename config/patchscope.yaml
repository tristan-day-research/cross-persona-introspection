# Patchscope activation interpretation pipeline
# Refs: Patchscopes (arXiv:2401.06102), SelfIE (arXiv:2403.10949)


# ═══════════════════════════════════════════════════════════════════════
# PROMPTS
# ═══════════════════════════════════════════════════════════════════════

# Prompt style — selects which variant to use from each template below.
#   "identity"    — raw pattern completion (X -> X; ___ ->). No chat template.
#   "patchscopes" — minimal structured prompt, chat-templated with evaluator persona.
#   "selfie"      — instructional prompt, chat-templated with evaluator persona.
prompt_style: "identity"

# Which templates to run (empty list = all).
# Valid: answer_extraction, persona_probe, agreement_probe, open_summary, self_recognition
enabled_templates: ["answer_extraction", "open_summary"]

# Template definitions. Each has three prompt variants.
# Variables: {placeholder}, {question_text}, {options}, {statement}
interpretation_templates:

  answer_extraction:
    identity: |
      A -> A; B -> B; C -> C; D -> D; {placeholder} ->
    patchscopes: |
      Question: {question_text}
      Options: {options}

      Answer: {placeholder}
    selfie: |
      {placeholder}

      Question: {question_text}
      Options: {options}

      What answer did the model choose?
      Respond with a single letter (A, B, C, or D).
    constrained: true

  persona_probe:
    identity: |
      Conservative -> Conservative; Progressive -> Progressive; {placeholder} ->
    patchscopes: |
      Persona: {placeholder}
    selfie: |
      {placeholder}

      Which persona produced this representation?
      Respond with: Conservative or Progressive.
    constrained: true

  agreement_probe:
    identity: |
      Agree -> Agree; Disagree -> Disagree; {placeholder} ->
    patchscopes: |
      Statement: {statement}

      Position: {placeholder}
    selfie: |
      {placeholder}

      Does this correspond to agreeing or disagreeing with the statement?

      {statement}

      Respond with: Agree or Disagree.
    constrained: true

  open_summary:
    identity: |
      cat -> cat; hello -> hello; {placeholder} ->
    patchscopes: |
      Representation: {placeholder}
    selfie: |
      {placeholder}

      Describe what this representation encodes about the model's reasoning.
    constrained: false

  self_recognition:
    identity: |
      Self -> Self; Other -> Other; {placeholder} ->
    patchscopes: |
      Source: {placeholder}
    selfie: |
      {placeholder}

      Was this produced by you or another persona?
      Respond with: Self or Other.
    constrained: true

# Prepended to selfie prompts only. Empty = disabled.
interpretation_base_prompt: ""


# ═══════════════════════════════════════════════════════════════════════
# LAYERS
# ═══════════════════════════════════════════════════════════════════════
# Three modes (first match wins):
#   1. layer_pairs  — explicit [source, injection] pairs
#   2. layer_sweep  — all combos of source_layers × injection_layers
#   3. defaults     — extraction.layers × injection.layer

# Option 1: explicit pairs (comment out to use option 2 or 3)
layer_pairs:
  - [20, 5]
  - [25, 1]
  - [25, 3]
  - [25, 5]
  - [20, 20]
  - [25, 25]
  - [30, 30]

# Option 2: full cross-product sweep (uncomment, remove layer_pairs above)
# layer_sweep:
#   enabled: true
#   source_layers: [4, 8, 12, 16, 20, 24, 28, 31]
#   injection_layers: [1, 3, 5, 8]

# Option 3: defaults (used when neither of the above is set)
extraction:
  token_position: "last"
  layers: "middle"          # "all", "middle", or [8, 16, 24]

injection:
  layer: 8
  mode: "replace"           # "replace" or "add"
  alpha: 1.0                # scaling for "add" mode
  num_placeholders: 1
  placeholder_token: "___"


# ═══════════════════════════════════════════════════════════════════════
# GENERATION
# ═══════════════════════════════════════════════════════════════════════

generation:
  max_new_tokens: 128
  temperature: 0.0
  do_sample: false
  # "logits"   — single-token probability distribution (quantitative)
  # "generate" — multi-token text (qualitative). Always used for open_summary.
  constrained_mode: "logits"

relevancy:
  enabled: false
  max_tokens: 64


# ═══════════════════════════════════════════════════════════════════════
# EXPERIMENT MATRIX
# ═══════════════════════════════════════════════════════════════════════

source_personas:
  - persona_conservative
  - persona_progressive

# Evaluator personas (ignored for identity style — no chat template)
evaluator_personas:
  - persona_conservative
  - persona_progressive
  - neutral_evaluator

# Question sampling
categories: ["cat_1", "cat_4"]   # empty = all categories
samples_per_category: 5          # null = all in category

# Controls
controls:
  text_only_baseline: true
  shuffled_activation: true
  control_sample_rate: 0.25      # fraction of cells to run controls on
