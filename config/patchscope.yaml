# Patchscope activation interpretation pipeline
# Refs: Patchscopes (arXiv:2401.06102), SelfIE (arXiv:2403.10949)

# ═══════════════════════════════════════════════════════════════════════
# LAYERS
# ═══════════════════════════════════════════════════════════════════════
# Three modes (first match wins):
#   1. layer_pairs  — explicit [source, injection] pairs
#   2. layer_sweep  — all combos of source_layers × injection_layers
#   3. defaults     — extraction.layers × injection.layer

# Option 1: explicit pairs (comment out to use option 2 or 3)
layer_pairs:
  - [20, 5]
  - [25, 1]
  - [25, 3]
  - [25, 5]
  - [20, 20]
  - [25, 25]
  - [30, 30]

# Option 2: full cross-product sweep (uncomment, remove layer_pairs above)
# layer_sweep:
#   enabled: true
#   source_layers: [4, 8, 12, 16, 20, 24, 28, 31]
#   injection_layers: [1, 3, 5, 8]


extraction:

  # Where to read hidden state in Phase 1 (same forward as A/B/C/D logits):
  #   "last" — last token of the full chat-templated string (add_generation_prompt=True).
  #            Often decodes as "\n\n" after <|eot_id|><|start_header_id|>assistant — template scaffolding,
  #            not the literal "Answer :" token.
  #   "last_before_assistant" — last token whose span ends BEFORE the first occurrence of
  #            assistant_boundary_marker (end of user turn, before assistant header tokens).
  #   <int> — explicit 0-based index into encode(templated_source, add_special_tokens=False).

  token_position: "last"


  # Substring search in the templated source string; only used when token_position is
  # last_before_assistant. Must match your model's chat template (Llama 3 Instruct default).
  assistant_boundary_marker: "<|eot_id|><|start_header_id|>assistant"

  layers: "middle"          # "all", "middle", or [8, 16, 24]

injection:
  # layer: 8
  mode: "replace"           # "replace" or "add"
  alpha: 1.0                # scaling for "add" mode
  # Repeats placeholder_token at {placeholder} for every prompt_style (not hardcoded per style).
  num_placeholders: 1
  placeholder_token: "___"


# ═══════════════════════════════════════════════════════════════════════
# GENERATION
# ═══════════════════════════════════════════════════════════════════════

generation:
  max_new_tokens: 64              # only used by generate mode (open_summary etc.)
  temperature: 0.0
  do_sample: false
  use_cache: false                 # applies to both generate() and model(...) decode paths
  # decode_mode is now per-template (set in interpretation_templates above)
  # When true, save full-vocab log-softmax at each choice token position
  # (choice_logprobs + total_choice_prob). Costs ~nothing extra compute
  # since we already have the full logit vector; just stores more per record.
  save_logprobs: true

relevancy:
  enabled: false
  max_tokens: 64


# ═══════════════════════════════════════════════════════════════════════
# EXPERIMENT MATRIX
# ═══════════════════════════════════════════════════════════════════════

source_personas:
  - persona_conservative
  - persona_progressive

# Reporter personas: their system prompts are applied via the chat template
# for every prompt_style (including identity).
reporter_personas:
  - persona_conservative
  - persona_progressive
  - neutral_evaluator

# Question sampling
# categories: ["cat_1", "cat_2", "cat_3", "cat_4", "cat_5"]   # empty = all categories
categories: ["cat_1", "cat_2", "cat_4"]   # empty = all categories
samples_per_category: 10      # null = all in category

# Controls
controls:
  text_only_baseline: true
  shuffled_activation: true
  control_sample_rate: 0.5      # 1.0 = run controls for every cell (needed for matched source_gain)

# Companion .txt log only (does not change JSONL records or metrics).
# For each (template, condition, source_layer→injection_layer) from layer_pairs, the .txt
# includes up to two samples: persona_alignment=match (source==reporter) and oppose
# (see opposing_sample_policy). Each block also runs a log-only decode with no reporter
# system when include_no_reporter_system_sample is true and the reporter has a system prompt.
reporting:
  include_no_reporter_system_sample: true
  # oppose bucket: cross_ideology = only persona_conservative ↔ persona_progressive;
  # any_mismatch = first source≠reporter seen for that layer pair (e.g. includes neutral_evaluator).
  opposing_sample_policy: "cross_ideology"


# ═══════════════════════════════════════════════════════════════════════
# PROMPTS
# ═══════════════════════════════════════════════════════════════════════

# Phase 1 — source forward pass: user message only (source persona system prompt
# is still applied in code from personas.yaml). Edit this to change MCQ layout
# or instructions without touching Python.
# Placeholders: {question_text}, {options_formatted} (A–D lines, present options only).
source_pass:
  user_message_template: |
    {question_text}

    {options_formatted}

    Choose the single best answer. Answer with exactly one letter: A, B, C, or D.
# Which templates to run (empty list = all).
# Valid: open_summary, answer_extraction, persona_probe, agreement_probe, self_recognition
enabled_templates: ["open_summary"]

# Prompt style — selects which variant to use from each template below.
#   "identity"    — pattern-completion user text (e.g. cat -> cat; {placeholder}).
#                   Still wrapped with the model chat template + reporter system prompt.
#   "patchscopes" — minimal structured user prompt + chat template + reporter system.
#   "selfie"      — instructional user prompt + chat template + reporter system.
prompt_style: "identity"

# Whether to wrap interpretation prompts in the model's chat template.
#   true  — apply_chat_template is used; reporter system prompt goes in the system role.
#           identity style always bypasses this (it is a raw continuation prompt by design).
#   false — no chat template for any style; reporter system prompt is prepended as plain
#           text followed by a blank line (e.g. "You are a conservative...\n\ncat -> cat; ___").
#           Keeps the model in base-model continuation mode regardless of prompt_style.
use_chat_template: false


# Template definitions. Each has three prompt variants.
# Variables: {placeholder}, {question_text}, {options}, {statement}
#
# decode_mode: "logits"   → single-token probability over fixed choices (A/B/C/D).
# decode_mode: "generate" → multi-token free-form text generation.
interpretation_templates:

  open_summary:
    identity: |
      cat -> cat; 135 -> 135; hello -> hello; {placeholder}
    # identity: |
    #   Complete the final line. Output only the missing text. Do not explain.

    #   cat -> cat
    #   135 -> 135
    #   hello -> hello
    #   {placeholder} ->
    # identity: |
    #   The placeholder below stands for an internal representation.
    #   In a short phrase, describe what it means.

    #   {placeholder}
    patchscopes: |
      Representation: {placeholder}
    selfie: |
      {placeholder}

      In one short phrase, describe what answer or stance this representation most strongly supports.
    decode_mode: "generate"  # free-form generation, no fixed choices OR generate


  answer_extraction:
    identity: |
      cat -> cat; 135 -> 135; hello -> hello; {placeholder}
    patchscopes: |
      {question_text}

      {options_formatted}

      Choose the single best answer. Answer with exactly one letter: A, B, C, or D.
      Answer: {placeholder}
    selfie: |
      {placeholder}

      {question_text}

      {options_formatted}

      What answer did the model choose?
      Respond with a single letter (A, B, C, or D).
    decode_mode: "generate"   # logits over {A, B, C, D} OR generate

  persona_probe:
    identity: |
      cat -> cat; 135 -> 135; hello -> hello; {placeholder}
    patchscopes: |
      Persona: {placeholder}
    selfie: |
      {placeholder}

      Which persona produced this representation?
      Respond with: Conservative or Progressive.
    decode_mode: "logits"   # logits over {Conservative, Progressive} OR generate

  agreement_probe:
    identity: |
      cat -> cat; 135 -> 135; hello -> hello; {placeholder}
    patchscopes: |
      Statement: {statement}

      Position: {placeholder}
    selfie: |
      {placeholder}

      Does this correspond to agreeing or disagreeing with the statement?

      {statement}

      Respond with: Agree or Disagree.
    decode_mode: "logits"   # logits over {Agree, Disagree} OR generate


  self_recognition:
    identity: |
      cat -> cat; 135 -> 135; hello -> hello; {placeholder}
    patchscopes: |
      Source: {placeholder}
    selfie: |
      {placeholder}

      Was this produced by you or another persona?
      Respond with: Self or Other.
    decode_mode: "logits"   # logits over {Self, Other} OR generate

# Prepended to selfie prompts only. Empty = disabled.
interpretation_base_prompt: ""


