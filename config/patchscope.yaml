# patchscope.yaml — activation interpretation (Patchscopes / SelfIE-style)
# Code: cross_persona_introspection/experiments/patchscope/
#
# Section order: run matrix → layers & extraction → decode → logit lens → controls &
# reporting → Phase-1 source text → Phase-2 interpretation templates → manual mode.

# =============================================================================
# RUN MATRIX
# =============================================================================

source_mode: "manual"   # "questions" (MCQ task file) | "manual" (manual_prompts below)

source_personas:
  - persona_conservative
  - persona_progressive

reporter_personas:
  - persona_conservative
  - persona_progressive
  - neutral_evaluator

# Question filter (source_mode: questions only). [] = all categories.
categories: ["cat_1", "cat_2", "cat_3", "cat_4", "cat_5"]
samples_per_category: null   # null = all items per category

use_chat_template: true
# true  — chat template + reporter system in system role (identity style still raw user text).
# false — plain continuation; system prepended above body.

interpretation_base_prompt: ""   # prepended to selfie-style bodies when non-empty; usually ""

# =============================================================================
# LAYERS & SOURCE ACTIVATION (Phase 1)
# =============================================================================
# Resolution order: layer_pairs (below) OR layer_sweep OR extraction.layers × injection.layer

layer_pairs:
  - [1, 1]
  - [3, 3]
  - [5, 5]
  - [8, 8]
  - [10, 10]
  - [12, 12]
  - [15, 15]
  - [20, 20]
  - [10, 3]
  - [12, 3]
  - [14, 5]
  - [18, 5]
  - [20, 3]
  - [25, 5]


extraction:
  readout: "both"
  # prefill | during_generation / autoregressive aliases | both

  autoregressive:
    decode_steps: "until_answer"    # or int >= 1
    answer_tokens: ["A", "B", "C", "D"]
    max_decode_steps: 64
    temperature: 0.0
    do_sample: false

  token_position: "last_before_assistant"
  # prefill only: last | last_before_assistant | int index | during_generation

  source_prompt_tokens_to_extract_from: 7
  max_generated_tokens_to_extract_from: 15
  # 0/null = single site from token_position / single gen step

  assistant_boundary_marker: "<|eot_id|><|redacted_start_header_id|>assistant<|redacted_end_header_id|>"

injection:
  mode: "replace"          # replace | add
  alpha: 1.0
  num_placeholders: 1
  placeholder_token: "_"

# =============================================================================
# REPORTER DECODE (Phase 2 generate / logits)
# =============================================================================

generation:
  max_new_tokens: 64
  temperature: 0.0
  do_sample: false
  use_cache: false
  save_logprobs: true

relevancy:
  enabled: false
  max_tokens: 64

# =============================================================================
# LOGIT LENS (separate JSON; no patching)
# =============================================================================

logit_lens:
  enabled: true
  layers: "all"
  top_n: 20
  bottom_n: 20
  phases: ["both"]
  all_tokens: true
  include_generated: true
  max_generated: 64
  max_questions: 2

# =============================================================================
# CONTROLS & .TXT REPORTING
# =============================================================================

controls:
  text_only_baseline: false
  shuffled_activation: false
  control_sample_rate: 0.5

reporting:
  include_no_reporter_system_sample: true
  include_no_persona_chat_template_sample_per_layer: true
  no_persona_layer_log_body: ""
  no_persona_layer_log_system_prompt: ""
  opposing_sample_policy: "cross_ideology"

# =============================================================================
# PHASE 1 — SOURCE USER MESSAGE
# =============================================================================
# Placeholders: {question_text}, {options_formatted}

source_pass:
  user_message_template: |
    {question_text}

    {options_formatted}

    Answer with exactly one letter: A, B, C, or D.
    Your answer is: 
  
# =============================================================================
# PHASE 2 — INTERPRETATION TEMPLATES
# =============================================================================
# Flat map: each key except decode_mode is one probe (JSONL template_name=interpretation,
# interpretation_prompt_style=<key>). Comment out a key to disable it.
# Placeholders: {placeholder} {persona_prompt} {question_text} {options} {options_formatted} {statement}
#
# Legacy nested layout still works, e.g. open_summary: { decode_mode: ... identity: | ... }.
# Then enabled_templates filters family names. Optional prompt_style narrows keys.

interpretation_templates:
  decode_mode: "generate"

  # --- baselines / simple probes ---
  identity: |
    cat -> cat; 135 -> 135; hello -> hello; {placeholder} ->
  repeat_word: |
    Please just simply repeat this word or letter once: {placeholder}.
  # explain_this: |
  #   Explain this: "{placeholder}"".
  # what_is_the_definition_of: |
  #   What is the definition of {placeholder}?
  what_does_this_mean: |
    What does "{placeholder}" mean?
  tell_me_about: |
    Tell me about {placeholder}.
  # what_does_placeholder_mean: |
  #   What does {placeholder} mean?
  # only_placeholder: |
  #   {placeholder}.
  # direct_answer: |
  #   {placeholder}
  #   Read the hidden content above and recover the answer choice it indicates.
  #   Output exactly one letter: A, B, C, or D. My answer is:
  # --- context-heavy probes ---
  # implicit_belief_probe: |
  #   The word or representation "{placeholder}" stands for an internal state while answering a multiple-choice question.
  #   In one or two sentences: what belief, attitude, or position does it most strongly reflect?
  #   Do not give a dictionary definition of any single word.
  # stance_freeform: |
  #   Treat the word or representation "{placeholder}" as evidence of how someone is leaning on a political issue (it may or may not be your own).
  #   Describe that leaning briefly (you may name parties, policies, or values). Not a definition.
  # answer_hypothesis: |
  #   The hidden marker is tied to how a model resolved this question:

  #   {question_text}

  #   {options_formatted}

  #   In one sentence, which answer option (A, B, C, or D) is it most consistent with, and why?
  #   Hidden marker: {placeholder}
  # one_word_association: |
  #   Output exactly one content word (no punctuation, no explanation) that best captures what
  #   "{placeholder}" is "about" in context — not the dictionary sense of any one token.
  # contextual_paraphrase: |
  #   Paraphrase the main issue or question the model was handling when the representation "{placeholder}"
  #   was active. Do not define the placeholder string literally.
  # what_position: |
  #   What stance or position does the following represent? "{placeholder}".
  # experiment: |
  #   I am a scientist studying LLMs such as yourself. Did you or another model or persona produce the following representation? "{placeholder}"
  interpretation_probe: |
    {persona_prompt}

    Below, ⟨X⟩ marks a position whose internal representation was copied from another model run.
    ⟨X⟩ is not an English word to define; ignore its surface shape.

    In 1 sentence, describe what attitude, policy lean, or issue framing that internal state most strongly supports — not typography or punctuation.

    ⟨X⟩{placeholder}


# =============================================================================
# MANUAL SOURCE MODE (source_mode: manual)
# =============================================================================

manual_prompts:
