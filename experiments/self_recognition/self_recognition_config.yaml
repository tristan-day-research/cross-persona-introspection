  # # ── MULTI-CLASS persona-source classification (all_persona_descriptions) ───
  # # New evaluation variant added to evaluate_self_recognition.py. It reuses the
  # # SAME on-disk persona summaries (generate_summaries.py) as the generated
  # # "texts" and asks, for each text, which candidate persona wrote it — the
  # # evaluator sees a shuffled candidate set labelled A/B/C/D… and returns a JSON
  # # probability distribution. The question is whether an *active* evaluator
  # # persona recognizes its own generations better than other evaluator personas
  # # recognize that same source persona's generations, over and above a neutral
  # # description-only baseline.
  # #
  # # New config knobs (all optional; defaults preserve the paper-faithful run):
  # #   measurements: list selecting which PHASES to run. Each phase is selectable
  # #     independently (e.g. ["recognition"] runs that and nothing else). Values:
  # #       "detection"                → pairwise self-recognition ("which did you write?")
  # #       "comparison"               → pairwise self-preference  ("which do you prefer?")
  # #       "recognition"              → individual self-recognition ("did you write this?")
  # #       "scoring"                  → individual self-preference  (Likert 1-5)
  # #       "all_persona_descriptions" → the multi-class classification variant
  # #     Family aliases also accepted as shorthand:
  # #       "pairwise"   = detection + comparison
  # #       "individual" = recognition + scoring
  # #     Default (omitted) = the four paper phases (detection, comparison,
  # #     recognition, scoring) — the original behavior.
  # #   candidate_display_mode:
  # #       "full_prompt_anonymous_labels" (default, main condition) — A/B/C/D
  # #           labels each shown with the candidate's FULL system prompt; persona
  # #           names are hidden from the model.
  # #       "short_label_names" (ablation) — A/B/C/D labels each shown with the
  # #           candidate's short persona NAME (semantic hint).
  # #   description_max_new_tokens: free-form JSON budget (default 256).
  # # The active_persona condition runs one (evaluator persona) unit per dataset;
  # # a description_only (neutral, no persona) condition runs automatically too.
  # # Rows are PersonaDescriptionEvalRecord — one analysis-friendly row per
  # # evaluation (source_persona, evaluator_persona, condition, candidate_mapping,
  # # correct_label, predicted_label, probabilities, correct_probability,
  # # is_correct, is_self, parse_status, raw_response, …).
  # #
  # # NOTE: like the other eval configs this READS summaries from disk, so run the
  # # matching gen config first (sample_size MUST match).

  # # Full run on Llama 3.1 8B Instruct, reusing the Llama summaries under data/
  # # (7 personas → A–G candidates per trial). Point generations_filepath at any source.

