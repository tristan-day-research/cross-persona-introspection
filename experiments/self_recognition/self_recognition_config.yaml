  # # ── BINARY 12-case self-recognition eval (case1…case12) ────────────────────
  # # Every trial is binary (A/B), so the chance baseline is always 50%. Setting
  # # `cases_to_run` switches evaluate_self_recognition into the BINARY path (the
  # # legacy `measurements:` phases are ignored). Each of the 12 cases is a SELF-
  # # CONTAINED condition — its evaluator-system-prompt state (active E vs neutral),
  # # how the other persona(s) are described, and the question wording are all fixed
  # # by the case itself (defined in evaluation_cases.py, the single source of truth):
  # #   case1  active E   1 text (E or O)   no desc          "under your current prompt?"
  # #   case2  active E   1 text (E or O)   O, full          "yours or the other's prompt?"
  # #   case3  active E   2 texts (E & O)   O, full          "which text is yours?"
  # #   case4  active E   2 texts (E & O)   O, full          "attribute each text"
  # #   case5  act+neu    2 texts (O1 & O2) both, full        "which persona wrote which?" (E not a candidate)
  # #   case6  neutral    2 texts (E & O)   E, full (label)  "which text was Persona E's?"
  # #   case7  active E   2 texts (E & O)   no desc          "which text is yours?" (cleanest probe)
  # #   case8  neutral    2 texts (E & O)   both, full        "which persona wrote which?" (decoding ceiling)
  # #   case9  neutral    2 texts (E & O)   both, redacted    "which persona wrote which?" (style floor)
  # #   case10 neutral    2 texts (E & O)   none / labels     "which text was Persona E's?" (minimal baseline)
  # #   case11 active E   2 texts (E & O)   O, redacted       "which text is yours?" (secret hidden)
  # #   case12 act+neu    per base case     per base case      calibration ceiling (obvious-style personas)
  # #
  # # Optional knobs (the per-case treatment is otherwise intrinsic — no fan-out):
  # #   description_style: override the description style for ALL describing cases —
  # #     one of system_prompt_style / third_person_description / redacted. The
  # #     redacted style (cases 9 & 11) is normally hand-curated (see descriptions
  # #     below); the heuristic auto-redaction is only a fallback.
  # #   calibration_base_case: which base case case12 mirrors (default case7).
  # #   calibration_personas: the obvious-style persona subset case12 runs over
  # #     (e.g. five_year_old; default = all configured personas).
  # #   max_trials_per_case: the single cap on how many examples EACH case uses.
  # #     A case's full enumeration (every text combination × counterbalance) can be
  # #     huge, so each case is randomly sampled down to this many LOGICAL trials
  # #     (seeded by sampling_seed) — set it to 1000 and every case uses 1000 random
  # #     examples. base_trial_ids are reused across the eval-SP variants so
  # #     comparisons aren't confounded by different sampled trials; the act+neutral
  # #     cases (5, 12) emit this many trials PER state, so 2× rows (not 2× examples).
  # # `sample_size` is the number of tasks n (common article keys) per group.
  # #
  # # Signal per trial: constrained A/B probabilities (prob_A/prob_B, 2-way softmax)
  # # and full-vocab logprob_A/logprob_B at the answer position. Rows are
  # # PersonaBinaryEvalRecord → results/text_evaluations/<task>/<ts>_self_recognition_binary_<model>/.
  # # Outputs: trials.jsonl (+ optional .parquet), trial_manifest.jsonl (pre-run,
  # # recoverable), eval_manifest.json. Re-running resumes (skips done trial_ids).
  # #
  # # `dry_run: true` previews assembled prompts + balance validations WITHOUT
  # # loading the model (good first step). Flip it off to actually evaluate.
  # #
  # # RUNNING A SUBSET OF CASES, ALL IN ONE DIRECTORY. Set `eval_dir` to a stable
  # # folder name: every run then writes into
  # # results/text_evaluations/<task>/<eval_dir>/ with ONE result file per case-set
  # # slice (e.g. case7.jsonl, or case3+case7.jsonl), plus
  # # manifests/<slice>.eval_manifest.json and _work/<slice>/ (trial manifest +
  # # persona_descriptions.json). So you can do, e.g.:
  # #   ... self_recognition_binary_dev --override eval_dir=run_2026_06 \
  # #        --override 'cases_to_run=["case7"]'
  # # and repeat per case; analysis globs <eval_dir>/*.jsonl. Re-running a slice
  # # resumes (skips trial_ids already written). Omit eval_dir → one fresh
  # # timestamped folder per run (legacy).
  # #
  # # PERSONA DESCRIPTIONS. Every description style per persona (system_prompt_style,
  # # third_person_description, redacted) is written to
  # # _work/<slice>/persona_descriptions.json (provenance). The 3rd-person and
  # # (especially) the redacted variants are heuristic, so to CURATE them — most
  # # importantly the redacted text for cases 9 & 11, where reliably removing a
  # # hidden goal needs human judgment — edit a copy and point `descriptions_filepath:`
  # # at it: listed (persona, style) entries override; anything omitted falls back
  # # to the computed text.
  # self_recognition_binary_dev:
  #   mode: evaluate_self_recognition
