  #   # individual_probability: also run the 0-100 numeric self-probability task.
  #   # paired_confidence:      ask paired evaluators for a 0-100 confidence too.
  #   # paired_counterbalanced: run each pair in both A/B orders (default true).
  #   # yes_no_logprobs:        record logprob_yes / logprob_no for YES/NO trials.
  #   individual_probability: false
  #   paired_confidence: false
  #   paired_counterbalanced: true
  #   yes_no_logprobs: false

